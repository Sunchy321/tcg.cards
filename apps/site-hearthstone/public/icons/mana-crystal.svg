<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="crystalOuter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="50%" style="stop-color:#2a4a7a"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
    <linearGradient id="crystalInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a8aff"/>
      <stop offset="50%" style="stop-color:#2a6aff"/>
      <stop offset="100%" style="stop-color:#1a4aaa"/>
    </linearGradient>
    <linearGradient id="crystalGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8ab4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4a8aff;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer hexagon frame -->
  <polygon points="100,10 180,55 180,145 100,190 20,145 20,55" fill="url(#crystalOuter)" stroke="#3a5a9a" stroke-width="3"/>
  
  <!-- Inner hexagon crystal -->
  <polygon points="100,25 165,62 165,138 100,175 35,138 35,62" fill="url(#crystalInner)" stroke="#5a9aff" stroke-width="2"/>
  
  <!-- Crystal facets -->
  <polygon points="100,40 150,68 150,132 100,160 50,132 50,68" fill="none" stroke="#7ab4ff" stroke-width="1" opacity="0.6"/>
  
  <!-- Center glow -->
  <circle cx="100" cy="100" r="35" fill="url(#crystalGlow)" filter="url(#glow)"/>
  
  <!-- Top highlight -->
  <polygon points="100,40 130,58 100,75 70,58" fill="#8ab4ff" opacity="0.4"/>
  
  <!-- Lightning/mana streaks -->
  <path d="M85 70 L95 90 L85 100 L100 95 L90 115" stroke="#8ab4ff" stroke-width="2" fill="none" opacity="0.6" stroke-linecap="round"/>
  <path d="M115 80 L105 100 L115 110 L100 105 L110 125" stroke="#8ab4ff" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>
  
  <!-- Small sparkles -->
  <circle cx="75" cy="65" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="125" cy="75" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="130" cy="120" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="70" cy="130" r="1.5" fill="#ffffff" opacity="0.6"/>
  
  <!-- Edge highlights -->
  <line x1="100" y1="25" x2="100" y2="175" stroke="#8ab4ff" stroke-width="1" opacity="0.3"/>
  <line x1="35" y1="62" x2="165" y2="138" stroke="#8ab4ff" stroke-width="1" opacity="0.2"/>
  <line x1="165" y1="62" x2="35" y2="138" stroke="#8ab4ff" stroke-width="1" opacity="0.2"/>
</svg>
