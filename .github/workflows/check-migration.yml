name: Check Migration

on:
  pull_request:
    paths:
      - '.github/workflows/check-migration.yml'
      - 'package.json'
      - 'bun.lock'
      - 'packages/db/**'
      - 'packages/shared/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/check-migration.yml'
      - 'package.json'
      - 'bun.lock'
      - 'packages/db/**'
      - 'packages/shared/**'

jobs:
  check-migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tcg_cards_ci
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tcg_cards_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate migration
        run: bun --cwd packages/db run db:generate

      - name: Verify committed migration files
        run: |
          if [ -n "$(git status --porcelain -- packages/db/migrations)" ]; then
            echo "Detected uncommitted migration changes."
            echo "Run 'bun --cwd packages/db run db:generate' and commit the result."
            git status --short -- packages/db/migrations
            exit 1
          fi

      - name: Prepare production migration env
        working-directory: packages/db
        run: |
          cat > .env.production <<'EOF'
          DATABASE_URL=postgres://postgres:postgres@localhost:55432/tcg_cards_ci
          EOF

      - name: Apply migrations to clean database
        run: bun --cwd packages/db run db:migrate
