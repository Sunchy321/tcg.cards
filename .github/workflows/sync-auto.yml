name: Auto Sync Latest

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时检查一次
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'

env:
  UPSTREAM_OWNER: HearthSim
  UPSTREAM_REPO: hsdata
  UPSTREAM_FILE: CardDefs.xml
  UPSTREAM_BRANCH: master

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      synced: ${{ steps.sync.outputs.synced }}
      tag: ${{ steps.target.outputs.tag }}
      commit: ${{ steps.target.outputs.commit }}
      previous: ${{ steps.check.outputs.previous_tag }}

    steps:
      - name: Show configuration
        run: |
          echo "Upstream: $UPSTREAM_OWNER/$UPSTREAM_REPO/$UPSTREAM_FILE (branch: $UPSTREAM_BRANCH)"

      - name: Install rclone
        run: |
          curl -s https://rclone.org/install.sh | sudo bash

      - name: Setup R2 credentials
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          EOF

      - name: Get last synced tag
        id: check
        run: |
          echo "Checking for existing sync state..."

          # Try to get last sync state from R2
          SYNC_STATE=$(rclone cat r2:${{ secrets.R2_BUCKET_NAME }}/hearthstone/hsdata/sync-state.json 2>/dev/null || echo '{}')
          LAST_TAG=$(echo "$SYNC_STATE" | jq -r '.tag // ""')
          LAST_COMMIT=$(echo "$SYNC_STATE" | jq -r '.commit // ""')

          if [ -z "$LAST_TAG" ]; then
            echo "No previous sync found. This will be treated as initial sync."
            echo "is_initial=true" >> $GITHUB_OUTPUT
            echo "previous_tag=none" >> $GITHUB_OUTPUT
            echo "previous_commit=none" >> $GITHUB_OUTPUT
          else
            echo "Last synced tag: $LAST_TAG (${LAST_COMMIT:0:7})"
            echo "is_initial=false" >> $GITHUB_OUTPUT
            echo "previous_tag=$LAST_TAG" >> $GITHUB_OUTPUT
            echo "previous_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
          fi

      - name: Get latest tag from upstream
        id: target
        run: |
          echo "Fetching latest tag from upstream..."

          # Get the most recent tag
          TAGS_RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$UPSTREAM_OWNER/$UPSTREAM_REPO/tags?per_page=1")

          LATEST_TAG=$(echo "$TAGS_RESPONSE" | jq -r '.[0].name // empty')
          COMMIT=$(echo "$TAGS_RESPONSE" | jq -r '.[0].commit.sha // empty')
          COMMIT_DATE=$(echo "$TAGS_RESPONSE" | jq -r '.[0].commit.url // empty' | xargs -I {} curl -s {} | jq -r '.committer.date // empty')

          if [ -z "$LATEST_TAG" ] || [ -z "$COMMIT" ]; then
            echo "Error: No tags found in upstream repository"
            exit 1
          fi

          echo "Latest upstream tag: $LATEST_TAG"
          echo "Commit: ${COMMIT:0:7}"
          echo "Commit date: $COMMIT_DATE"

          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "short_commit=${COMMIT:0:7}" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Determine if sync needed
        id: decision
        run: |
          PREVIOUS="${{ steps.check.outputs.previous_tag }}"
          CURRENT="${{ steps.target.outputs.tag }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ "$FORCE" = "true" ]; then
            echo "Force sync requested"
            echo "should_sync=true" >> $GITHUB_OUTPUT
            echo "reason=force" >> $GITHUB_OUTPUT
          elif [ "$PREVIOUS" = "none" ]; then
            echo "Initial sync needed"
            echo "should_sync=true" >> $GITHUB_OUTPUT
            echo "reason=initial" >> $GITHUB_OUTPUT
          elif [ "$PREVIOUS" = "$CURRENT" ]; then
            echo "Already up to date with tag $CURRENT"
            echo "should_sync=false" >> $GITHUB_OUTPUT
            echo "reason=up_to_date" >> $GITHUB_OUTPUT
          else
            echo "New tag detected: $PREVIOUS -> $CURRENT"
            echo "should_sync=true" >> $GITHUB_OUTPUT
            echo "reason=new_tag" >> $GITHUB_OUTPUT
          fi

      - name: Sync to R2
        id: sync
        if: steps.decision.outputs.should_sync == 'true'
        run: |
          TAG="${{ steps.target.outputs.tag }}"
          COMMIT="${{ steps.target.outputs.commit }}"
          IS_INITIAL="${{ steps.check.outputs.is_initial }}"

          echo "Starting sync for tag $TAG (commit ${COMMIT:0:7})..."

          # Check if file already exists (might have been synced manually)
          EXISTS=$(rclone lsjson r2:${{ secrets.R2_BUCKET_NAME }}/hearthstone/hsdata/data/$TAG.xml.gz 2>/dev/null | jq -c . || echo "[]")

          if [ "$EXISTS" != "[]" ]; then
            echo "File already exists in R2, skipping download"
            echo "downloaded=false" >> $GITHUB_OUTPUT
          else
            echo "Downloading from upstream..."
            mkdir -p data

            DOWNLOAD_URL="https://raw.githubusercontent.com/$UPSTREAM_OWNER/$UPSTREAM_REPO/$COMMIT/$UPSTREAM_FILE"

            curl -fL --retry 3 --retry-delay 5 \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              --max-time 300 \
              -o data.xml \
              "$DOWNLOAD_URL"

            FILE_SIZE=$(stat -c%s data.xml)
            echo "Downloaded: $(numfmt --to=iec-i $FILE_SIZE)"

            echo "Compressing..."
            gzip -c data.xml > "data/$TAG.xml.gz"

            echo "Uploading to R2..."
            rclone copy "data/$TAG.xml.gz" \
              r2:${{ secrets.R2_BUCKET_NAME }}/hearthstone/hsdata/data/ \
              --progress

            echo "downloaded=true" >> $GITHUB_OUTPUT
            echo "file_size=$FILE_SIZE" >> $GITHUB_ENV
          fi

          # Determine sync type
          if [ "$IS_INITIAL" = "true" ]; then
            SYNC_TYPE="full"
          else
            SYNC_TYPE="incremental"
          fi

          echo "Sync type: $SYNC_TYPE"
          echo "type=$SYNC_TYPE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "synced=true" >> $GITHUB_OUTPUT

      - name: Update sync state
        if: steps.sync.outputs.synced == 'true'
        run: |
          TAG="${{ steps.sync.outputs.tag }}"
          COMMIT="${{ steps.sync.outputs.commit }}"
          SYNC_TYPE="${{ steps.sync.outputs.type }}"
          PREVIOUS_TAG="${{ steps.check.outputs.previous_tag }}"
          FILE_SIZE="${{ env.file_size || '0' }}"

          # Ensure FILE_SIZE is a valid number
          if [ -z "$FILE_SIZE" ] || [ "$FILE_SIZE" = "null" ]; then
            FILE_SIZE=0
          fi

          # Get existing history
          EXISTING_STATE=$(rclone cat r2:${{ secrets.R2_BUCKET_NAME }}/hearthstone/hsdata/sync-state.json 2>/dev/null || echo '{"history":[]}')

          # Validate JSON
          if ! echo "$EXISTING_STATE" | jq empty 2>/dev/null; then
            echo "WARNING: Invalid JSON in EXISTING_STATE, resetting to default"
            EXISTING_STATE='{"history":[]}'
          fi

          jq -n \
            --arg tag "$TAG" \
            --arg commit "$COMMIT" \
            --arg short "${COMMIT:0:7}" \
            --arg synced_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg type "$SYNC_TYPE" \
            --arg previous "$PREVIOUS_TAG" \
            --arg upstream_branch "$UPSTREAM_BRANCH" \
            --argjson file_size "$FILE_SIZE" \
            --argjson existing "$EXISTING_STATE" \
            '{
              tag: $tag,
              commit: $commit,
              short: $short,
              synced_at: $synced_at,
              type: $type,
              previous: (if $previous == "none" then null else $previous end),
              upstream_branch: $upstream_branch,
              file_size: $file_size,
              history: ([{
                tag: $tag,
                commit: $commit,
                type: $type,
                date: $synced_at,
                size: $file_size
              }] + ($existing.history // []))[:50]
            }' > sync-state.json

          rclone copy sync-state.json r2:${{ secrets.R2_BUCKET_NAME }}/hearthstone/hsdata/
          cp sync-state.json latest.json
          rclone copy latest.json r2:${{ secrets.R2_BUCKET_NAME }}/hearthstone/hsdata/

      - name: Cleanup
        if: always()
        run: |
          rm -f data.xml data/*.xml.gz *.json
          rm -rf data

      - name: Summary - Synced
        if: steps.sync.outputs.synced == 'true'
        run: |
          echo "## Auto Sync Complete :white_check_mark:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Type** | ${{ steps.sync.outputs.type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.target.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ steps.target.outputs.short_commit }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Previous Tag** | \`${{ steps.check.outputs.previous_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Upstream Date** | ${{ steps.target.outputs.commit_date }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.file_size }}" != "" ]; then
            echo "| **File Size** | $(numfmt --to=iec-i ${{ env.file_size }}) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> :information_source: File uploaded to R2 with tag name. Import to database must be triggered manually from admin panel." >> $GITHUB_STEP_SUMMARY

      - name: Summary - No Changes
        if: steps.decision.outputs.should_sync == 'false'
        run: |
          echo "## No Sync Needed :zzz:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Already up to date with upstream tag \`${{ steps.target.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ steps.target.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.target.outputs.short_commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Last sync**: ${{ steps.check.outputs.previous_tag }}" >> $GITHUB_STEP_SUMMARY

  notify:
    needs: check-and-sync
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on failure
        run: |
          echo "Sync job failed!"
          # 这里可以添加 Slack/Discord/钉钉通知
          # curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
          #   -H 'Content-type: application/json' \
          #   -d '{"text":"Data sync failed! Check ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
